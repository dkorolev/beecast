name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --release -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --release
      - run: python3 -m unittest discover -s seecast/tests -v
      - run: python3 -m unittest discover -s .github -p 'test_*.py' -v
      - name: Verify the release commit and version ladder
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # The checkout is GitHub's synthetic merge commit; the gate must inspect the
          # PR head, so pass it explicitly (reachable as the merge commit's parent).
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/check-release.py "$BASE_SHA" "$HEAD_SHA"
      # Packaging (the dry run of publishing) must be warning-free. Cargo's transient
      # "spurious network error" retry warnings from the index fetch are not packaging
      # warnings — filter them out before the gate, or a network hiccup fails the build.
      - run: |
          pkg_out="$(cargo package --workspace 2>&1)" || { printf '%s\n' "$pkg_out"; exit 1; }
          printf '%s\n' "$pkg_out"
          real="$(printf '%s\n' "$pkg_out" | grep 'warning:' | grep -v 'spurious network error' || true)"
          if [ -n "$real" ]; then echo "cargo package must be warning-free"; exit 1; fi

  # Browser gates over the real artifact: the page is built with the actual CLI from the
  # fixture cast, then tested over file:// and a throwaway HTTP server in every engine.
  # CI-required but locally optional — the one deliberate deviation from "pre-push and CI
  # run the same gates" (a three-browser matrix is too heavy for pre-push).
  #
  # WebKit runs on macOS, where it is the native engine: on ubuntu, `--with-deps` apt-installs
  # a WebKit dependency list that takes several minutes and no cache can cover (the
  # ms-playwright cache holds browser binaries, not system packages) — on macOS there are no
  # system deps to install at all, and the engine is closer to literal Safari.
  browser:
    runs-on: ${{ matrix.browser == 'webkit' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: browser-tests
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ matrix.browser == 'webkit' && '~/Library/Caches/ms-playwright' || '~/.cache/ms-playwright' }}
          key: playwright-${{ steps.pw.outputs.version }}-${{ matrix.browser }}
      # --with-deps is the linux apt path; macOS needs no system dependencies.
      - run: npx playwright install ${{ matrix.browser != 'webkit' && '--with-deps' || '' }} ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.browser }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}
          path: browser-tests/test-results/
          if-no-files-found: ignore

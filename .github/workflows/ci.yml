name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --release
      - run: python3 -m unittest discover -s seecast/tests -v
      # Packaging (the dry run of publishing) must be warning-free.
      - run: |
          pkg_out="$(cargo package --workspace 2>&1)" || { printf '%s\n' "$pkg_out"; exit 1; }
          printf '%s\n' "$pkg_out"
          case "$pkg_out" in
            *warning:*) echo "cargo package must be warning-free"; exit 1;;
          esac

[package]
name = "beecast-dto"
description = "The BeeCast cast-metadata DTO: the { title, summary, chapters } sidecar types, their validator, and the JSON Schema generated from them."
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
keywords = ["asciinema", "cast", "metadata", "schema", "dto"]
categories = ["data-structures", "parser-implementations"]
# Ship the generated schema and its human rendering next to the source, so the crate is self-contained.
# `include_str!` embeds the schema file for the byte-for-byte pin test, and SCHEMA.md documents the shape.
include = ["/src/", "/schema/", "/README.md", "/SCHEMA.md"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
schemars.workspace = true
